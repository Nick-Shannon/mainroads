<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SLK Lookup Engine</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 15px;
            color: #333;
            max-width: 900px;
            margin: 0 auto;
        }

        .result-box {
            border: 1px solid #ccc;
            padding: 10px;
            border-radius: 5px;
            background: #f9f9f9;
        }

        .result-item {
            margin-bottom: 10px;
        }

        .loading {
            color: #666;
            font-style: italic;
        }

        .error {
            color: red;
        }

        #streetview {
            margin-top: 15px;
        }

        .streetview-img {
            width: 50%;
            max-width: 420px;
            height: auto;
            border-radius: 5px;
            display: block;
        }

        .note {
            color: #666;
            font-size: 0.95em;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div id="app">
    <div id="results" class="result-box">
        <p class="loading">Waiting for coordinates...</p>
    </div>
    <div id="streetview"></div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const lat = params.get('lat');
    const lon = params.get('lon');

    // NOTE: If this page is live/public, consider rotating and re-checking
    // API key restrictions in Google Cloud Console.
    const apiKey = 'YOUR_GOOGLE_API_KEY_HERE';

    if (!lat || !lon) {
        document.getElementById('results').innerHTML = "No coordinates provided.";
    } else {
        fetchSLK(lat, lon);
    }

    async function fetchSLK(lat, lon) {
        const resultsDiv = document.getElementById('results');
        const svDiv = document.getElementById('streetview');

        resultsDiv.innerHTML = "<p class='loading'>Fetching SLK data...</p>";
        svDiv.innerHTML = "";

        try {
            const irisUrl =
                `https://publicirisservices.mainroads.wa.gov.au/GpsSlkWeb/GpsSlkWeb.svc/rest/GetPossibleSlks?latitude=${encodeURIComponent(lat)}&longitude=${encodeURIComponent(lon)}&tolerance=50`;

            const response = await fetch(irisUrl);

            if (!response.ok) {
                throw new Error(`IRIS request failed with status ${response.status}`);
            }

            const json = await response.json();
            const data = json.GetPossibleSlksResult || json;

            if (data && data.length > 0) {
                resultsDiv.innerHTML = data.map(item => `
                    <div class="result-item">
                        <h4>${item.RoadName}</h4>
                        <p><strong>Road No:</strong> ${item.RoadNo}</p>
                        <p><strong>SLK:</strong> ${item.FormattedSlk}</p>
                        <p><strong>Carriageway:</strong> ${item.CarriageWay}</p>
                    </div>
                `).join("<hr>");
            } else {
                resultsDiv.innerHTML = "<p>No SLK results found.</p>";
            }

            // Smaller Street View image
            const streetUrl =
                `https://maps.googleapis.com/maps/api/streetview?size=400x200&location=${encodeURIComponent(lat)},${encodeURIComponent(lon)}&radius=100&heading=0&pitch=0&key=${apiKey}`;

            const img = new Image();
            img.src = streetUrl;
            img.alt = "Street View";
            img.className = "streetview-img";

            img.onload = () => {
                svDiv.innerHTML = "";
                svDiv.appendChild(img);
            };

            img.onerror = () => {
                svDiv.innerHTML = `<p class="note">No Street View available at this location.</p>`;
            };

        } catch (error) {
            console.error(error);

            resultsDiv.innerHTML = `
                <p class="error">Error fetching SLK data.</p>
                <p class="note">
                    If your browser is asking for local network access, the IRIS service may be resolving to a private/internal network address in your current environment.
                </p>
            `;
        }
    }
</script>

</body>
</html>
